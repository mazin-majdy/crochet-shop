<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b1113;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#422018;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>
  <!-- Decorative border -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Thread spool base -->
  <ellipse cx="100" cy="130" rx="28" ry="10" fill="#d4af37" opacity="0.9"/>
  <rect x="72" y="90" width="56" height="40" rx="4" fill="#d4af37" opacity="0.85"/>
  <ellipse cx="100" cy="90" rx="28" ry="10" fill="#f1c40f"/>
  <!-- Thread lines on spool -->
  <line x1="80" y1="92" x2="78" y2="128" stroke="#422018" stroke-width="1.2" opacity="0.4"/>
  <line x1="90" y1="91" x2="89" y2="129" stroke="#422018" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="90" x2="100" y2="130" stroke="#422018" stroke-width="1.2" opacity="0.4"/>
  <line x1="110" y1="91" x2="111" y2="129" stroke="#422018" stroke-width="1.2" opacity="0.4"/>
  <line x1="120" y1="92" x2="122" y2="128" stroke="#422018" stroke-width="1.2" opacity="0.4"/>
  <!-- Needle -->
  <line x1="115" y1="50" x2="85" y2="95" stroke="#f1c40f" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="116" cy="48" rx="4" ry="6" fill="none" stroke="#f1c40f" stroke-width="2"/>
  <!-- Decorative embroidery dots -->
  <circle cx="60" cy="70" r="3" fill="#f1c40f" opacity="0.6"/>
  <circle cx="140" cy="65" r="3" fill="#f1c40f" opacity="0.6"/>
  <circle cx="55" cy="110" r="2" fill="#f1c40f" opacity="0.5"/>
  <circle cx="145" cy="115" r="2" fill="#f1c40f" opacity="0.5"/>
  <!-- Floral decorative elements -->
  <circle cx="68" cy="72" r="6" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <circle cx="132" cy="67" r="6" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <!-- Text -->
  <text x="100" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f1c40f" letter-spacing="1">لمسة خيط</text>
</svg>
